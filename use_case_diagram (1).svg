<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="1000" height="720" fill="#ffffff"/>
  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1f2933">Use Case Diagram — Random Password Generator</text>

  <!-- System boundary -->
  <rect x="230" y="70" width="700" height="600" fill="#fafafa" stroke="#334155" stroke-width="2" rx="8"/>
  <text x="580" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">Random Password Generator System</text>

  <!-- ==== Actor: User ==== -->
  <g stroke="#1f2933" stroke-width="2.5" fill="none">
    <circle cx="110" cy="150" r="18" fill="#ffffff"/>
    <line x1="110" y1="168" x2="110" y2="230"/>
    <line x1="75" y1="190" x2="145" y2="190"/>
    <line x1="110" y1="230" x2="80" y2="270"/>
    <line x1="110" y1="230" x2="140" y2="270"/>
  </g>
  <text x="110" y="295" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2933">User</text>

  <!-- ==== Use case ellipses ==== -->
  <!-- Generate Password (primary) -->
  <ellipse cx="470" cy="140" rx="130" ry="34" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="470" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2933">Generate Password</text>

  <!-- Set Password Length -->
  <ellipse cx="470" cy="230" rx="130" ry="30" fill="#ecfeff" stroke="#0e7490" stroke-width="2"/>
  <text x="470" y="235" text-anchor="middle" font-size="12.5" fill="#1f2933">Set Password Length</text>

  <!-- Select Character Types -->
  <ellipse cx="470" cy="315" rx="130" ry="30" fill="#ecfeff" stroke="#0e7490" stroke-width="2"/>
  <text x="470" y="320" text-anchor="middle" font-size="12.5" fill="#1f2933">Select Character Types</text>

  <!-- sub include options -->
  <ellipse cx="800" cy="260" rx="115" ry="26" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="800" y="265" text-anchor="middle" font-size="11.5" fill="#1f2933">Include Uppercase/Lowercase</text>

  <ellipse cx="800" cy="325" rx="115" ry="26" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
  <text x="800" y="330" text-anchor="middle" font-size="11.5" fill="#1f2933">Include Numbers/Symbols</text>

  <!-- Check Password Strength (extends) -->
  <ellipse cx="470" cy="400" rx="130" ry="30" fill="#fff7ed" stroke="#c2410c" stroke-width="2"/>
  <text x="470" y="405" text-anchor="middle" font-size="12.5" fill="#1f2933">Check Password Strength</text>

  <!-- Copy to Clipboard -->
  <ellipse cx="470" cy="480" rx="130" ry="30" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="470" y="485" text-anchor="middle" font-size="12.5" fill="#1f2933">Copy to Clipboard</text>

  <!-- Save Password -->
  <ellipse cx="470" cy="555" rx="130" ry="30" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="470" y="560" text-anchor="middle" font-size="12.5" fill="#1f2933">Save Password</text>

  <!-- View Password History -->
  <ellipse cx="470" cy="630" rx="130" ry="30" fill="#f5f3ff" stroke="#6d28d9" stroke-width="2"/>
  <text x="470" y="635" text-anchor="middle" font-size="12.5" fill="#1f2933">View Password History</text>

  <!-- ==== Actor to use case associations ==== -->
  <line x1="145" y1="180" x2="345" y2="145" stroke="#1f2933" stroke-width="1.5"/>
  <line x1="145" y1="195" x2="345" y2="230" stroke="#1f2933" stroke-width="1.5"/>
  <line x1="145" y1="210" x2="330" y2="480" stroke="#1f2933" stroke-width="1.5"/>
  <line x1="145" y1="215" x2="330" y2="555" stroke="#1f2933" stroke-width="1.5"/>
  <line x1="145" y1="220" x2="330" y2="630" stroke="#1f2933" stroke-width="1.5"/>

  <!-- ==== include / extend relationships ==== -->
  <!-- Generate includes Set Length -->
  <line x1="470" y1="174" x2="470" y2="200" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="480" y="192" font-size="11" font-style="italic" fill="#334155">&lt;&lt;include&gt;&gt;</text>

  <!-- Generate includes Select Char Types -->
  <path d="M 400 172 C 380 220, 400 270, 400 288" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="320" y="230" font-size="11" font-style="italic" fill="#334155">&lt;&lt;include&gt;&gt;</text>

  <!-- Select Char Types includes sub options -->
  <line x1="598" y1="300" x2="690" y2="270" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="600" y="280" font-size="11" font-style="italic" fill="#334155">&lt;&lt;include&gt;&gt;</text>

  <line x1="598" y1="325" x2="690" y2="325" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="600" y="345" font-size="11" font-style="italic" fill="#334155">&lt;&lt;include&gt;&gt;</text>

  <!-- Check Strength extends Generate -->
  <path d="M 470 370 C 470 350, 470 200, 470 174" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="2,3" marker-end="url(#arrow)"/>
  <text x="240" y="255" font-size="11" font-style="italic" fill="#334155">&lt;&lt;extend&gt;&gt;</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <!-- Legend -->
  <g>
    <rect x="30" y="600" width="170" height="90" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <text x="40" y="618" font-size="11.5" font-weight="bold" fill="#334155">Legend</text>
    <line x1="40" y1="632" x2="70" y2="632" stroke="#1f2933" stroke-width="1.5"/>
    <text x="76" y="636" font-size="10.5" fill="#334155">association</text>
    <line x1="40" y1="650" x2="70" y2="650" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="76" y="654" font-size="10.5" fill="#334155">&lt;&lt;include&gt;&gt;</text>
    <line x1="40" y1="668" x2="70" y2="668" stroke="#334155" stroke-width="1.5" stroke-dasharray="2,3"/>
    <text x="76" y="672" font-size="10.5" fill="#334155">&lt;&lt;extend&gt;&gt;</text>
  </g>
</svg>
