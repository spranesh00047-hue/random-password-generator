<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cipher — Password Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1418;
    --ink-2:#161D22;
    --panel:#1A2229;
    --brass:#C89B3C;
    --brass-dim:#8C6E2C;
    --teal:#3A6B63;
    --paper:#E8E6DE;
    --paper-dim:#9BA3A0;
    --danger:#B5453A;
    --ok:#5E9E7A;
    --radius:2px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(200,155,60,0.05), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(58,107,99,0.06), transparent 45%);
  }

  .device{
    width:100%;
    max-width:560px;
    background:var(--ink-2);
    border:1px solid #2A343B;
    border-radius:4px;
    padding:32px;
    position:relative;
    box-shadow:0 40px 80px -30px rgba(0,0,0,0.6);
  }

  .device::before{
    content:"";
    position:absolute;
    top:14px; left:14px; right:14px; bottom:14px;
    border:1px solid #232B31;
    border-radius:3px;
    pointer-events:none;
  }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--brass);
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:6px;
  }

  .eyebrow .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--ok);
    box-shadow:0 0 8px var(--ok);
  }

  h1{
    font-family:'IBM Plex Mono', monospace;
    font-weight:700;
    font-size:22px;
    letter-spacing:0.02em;
    margin:0 0 24px 0;
    color:var(--paper);
  }

  h1 span{ color:var(--paper-dim); font-weight:400; }

  /* Readout - the signature element */
  .readout{
    background:var(--ink);
    border:1px solid #2A343B;
    border-radius:3px;
    padding:22px 18px;
    margin-bottom:18px;
    position:relative;
    overflow:hidden;
  }

  .readout::after{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.012) 0px,
      rgba(255,255,255,0.012) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events:none;
  }

  .readout-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--paper-dim);
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
  }

  .readout-value{
    font-family:'IBM Plex Mono', monospace;
    font-size:clamp(16px, 4.6vw, 24px);
    font-weight:600;
    letter-spacing:0.04em;
    word-break:break-all;
    line-height:1.5;
    min-height:1.5em;
    color:var(--brass);
    text-shadow:0 0 18px rgba(200,155,60,0.25);
  }

  .readout-value .char-sym{ color:var(--teal); }
  .readout-value .char-num{ color:#7FA8D9; }

  .actions-row{
    display:flex;
    gap:10px;
    margin-top:16px;
  }

  button{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    border-radius:2px;
    border:1px solid transparent;
    cursor:pointer;
    padding:12px 16px;
    transition:transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
  }

  button:active{ transform:scale(0.98); }

  .btn-primary{
    flex:1;
    background:var(--brass);
    color:#141A1E;
    font-weight:600;
    border-color:var(--brass);
  }
  .btn-primary:hover{ background:#D9AB4C; }

  .btn-secondary{
    background:transparent;
    color:var(--paper);
    border-color:#33404A;
  }
  .btn-secondary:hover{ border-color:var(--brass-dim); color:var(--brass); }

  .btn-secondary.copied{
    border-color:var(--ok);
    color:var(--ok);
  }

  /* Strength gauge */
  .gauge-row{
    display:flex;
    align-items:center;
    gap:14px;
    margin-top:16px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--paper-dim);
  }

  .gauge-track{
    flex:1;
    height:6px;
    background:#232B31;
    border-radius:3px;
    overflow:hidden;
    position:relative;
  }

  .gauge-fill{
    height:100%;
    width:0%;
    background:var(--danger);
    transition:width 0.35s ease, background 0.35s ease;
    border-radius:3px;
  }

  .gauge-tag{
    min-width:64px;
    text-align:right;
    color:var(--paper);
  }

  /* Controls */
  .controls{
    margin-top:28px;
    display:flex;
    flex-direction:column;
    gap:20px;
  }

  .control-block{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .control-label{
    display:flex;
    justify-content:space-between;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--paper-dim);
  }

  .control-label .value{ color:var(--brass); }

  input[type="range"]{
    -webkit-appearance:none;
    width:100%;
    height:2px;
    background:#33404A;
    border-radius:2px;
    outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:16px; height:16px;
    border-radius:50%;
    background:var(--brass);
    border:2px solid var(--ink);
    box-shadow:0 0 0 1px var(--brass-dim);
    cursor:pointer;
    margin-top:-1px;
  }
  input[type="range"]::-moz-range-thumb{
    width:16px; height:16px;
    border-radius:50%;
    background:var(--brass);
    border:2px solid var(--ink);
    cursor:pointer;
  }

  .toggles{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .toggle{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--panel);
    border:1px solid #2A343B;
    border-radius:2px;
    padding:11px 12px;
    cursor:pointer;
    user-select:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--paper);
    transition:border-color 0.15s ease;
  }
  .toggle:hover{ border-color:#3A4A54; }

  .switch{
    width:30px; height:16px;
    border-radius:8px;
    background:#33404A;
    position:relative;
    flex-shrink:0;
    transition:background 0.15s ease;
  }
  .switch::after{
    content:"";
    position:absolute;
    top:2px; left:2px;
    width:12px; height:12px;
    border-radius:50%;
    background:var(--paper-dim);
    transition:transform 0.15s ease, background 0.15s ease;
  }
  .toggle.on .switch{ background:rgba(200,155,60,0.25); }
  .toggle.on .switch::after{
    transform:translateX(14px);
    background:var(--brass);
  }

  footer{
    margin-top:24px;
    padding-top:16px;
    border-top:1px solid #232B31;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.08em;
    color:var(--paper-dim);
    display:flex;
    justify-content:space-between;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }

  @media (max-width:420px){
    .toggles{ grid-template-columns:1fr; }
    .device{ padding:22px; }
  }
</style>
</head>
<body>

<div class="device" role="main">
  <div class="eyebrow"><span class="dot"></span>LOCAL &middot; NEVER TRANSMITTED</div>
  <h1>Cipher <span>/ password generator</span></h1>

  <div class="readout">
    <div class="readout-label">
      <span>Output</span>
      <span id="lengthTag">16 chars</span>
    </div>
    <div class="readout-value" id="output" aria-live="polite">••••••••••••••••</div>
  </div>

  <div class="actions-row">
    <button class="btn-primary" id="generateBtn">Generate</button>
    <button class="btn-secondary" id="copyBtn">Copy</button>
  </div>

  <div class="gauge-row">
    <span id="gaugeLabel">Strength</span>
    <div class="gauge-track"><div class="gauge-fill" id="gaugeFill"></div></div>
    <span class="gauge-tag" id="gaugeTag">—</span>
  </div>

  <div class="controls">
    <div class="control-block">
      <div class="control-label">
        <span>Length</span>
        <span class="value" id="lengthValue">16</span>
      </div>
      <input type="range" id="lengthSlider" min="6" max="64" value="16">
    </div>

    <div class="control-block">
      <div class="control-label"><span>Character sets</span></div>
      <div class="toggles">
        <div class="toggle on" data-key="lower">
          <span>a–z lowercase</span><div class="switch"></div>
        </div>
        <div class="toggle on" data-key="upper">
          <span>A–Z uppercase</span><div class="switch"></div>
        </div>
        <div class="toggle on" data-key="numbers">
          <span>0–9 numbers</span><div class="switch"></div>
        </div>
        <div class="toggle on" data-key="symbols">
          <span>!@# symbols</span><div class="switch"></div>
        </div>
        <div class="toggle" data-key="excludeAmbiguous">
          <span>Exclude i/l/1/O/0</span><div class="switch"></div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <span>generated in-browser, no network calls</span>
    <span id="entropyTag">— bits</span>
  </footer>
</div>

<script>
(function(){
  const state = {
    lower:true, upper:true, numbers:true, symbols:true, excludeAmbiguous:false,
    length:16
  };

  const SETS = {
    lower:"abcdefghijklmnopqrstuvwxyz",
    upper:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
    numbers:"0123456789",
    symbols:"!@#$%^&*()_+-=[]{}|;:,.<>?/~"
  };
  const AMBIGUOUS = /[il1LoO0]/g;

  const output = document.getElementById('output');
  const lengthSlider = document.getElementById('lengthSlider');
  const lengthValue = document.getElementById('lengthValue');
  const lengthTag = document.getElementById('lengthTag');
  const gaugeFill = document.getElementById('gaugeFill');
  const gaugeTag = document.getElementById('gaugeTag');
  const entropyTag = document.getElementById('entropyTag');
  const copyBtn = document.getElementById('copyBtn');
  const generateBtn = document.getElementById('generateBtn');

  function buildPool(){
    let pool = "";
    if(state.lower) pool += SETS.lower;
    if(state.upper) pool += SETS.upper;
    if(state.numbers) pool += SETS.numbers;
    if(state.symbols) pool += SETS.symbols;
    if(state.excludeAmbiguous) pool = pool.replace(AMBIGUOUS, "");
    return pool;
  }

  function secureRandomInt(max){
    const arr = new Uint32Array(1);
    crypto.getRandomValues(arr);
    return arr[0] % max;
  }

  function classify(ch){
    if(SETS.numbers.includes(ch)) return 'char-num';
    if(SETS.symbols.includes(ch)) return 'char-sym';
    return '';
  }

  function renderOutput(pw){
    output.innerHTML = pw.split("").map(ch => {
      const cls = classify(ch);
      return cls ? `<span class="${cls}">${escapeHtml(ch)}</span>` : escapeHtml(ch);
    }).join("");
  }

  function escapeHtml(ch){
    return ch.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function generate(){
    const pool = buildPool();
    if(pool.length === 0){
      output.textContent = "Select at least one character set";
      gaugeFill.style.width = "0%";
      gaugeTag.textContent = "—";
      entropyTag.textContent = "— bits";
      return;
    }
    let pw = "";
    for(let i=0; i<state.length; i++){
      pw += pool[secureRandomInt(pool.length)];
    }
    renderOutput(pw);
    updateStrength(pool.length, state.length);
  }

  function updateStrength(poolSize, length){
    const bits = Math.log2(poolSize) * length;
    entropyTag.textContent = Math.round(bits) + " bits";
    let pct, color, label;
    if(bits < 40){ pct = 25; color = "#B5453A"; label = "Weak"; }
    else if(bits < 60){ pct = 50; color = "#C89B3C"; label = "Fair"; }
    else if(bits < 90){ pct = 75; color = "#3A6B63"; label = "Strong"; }
    else { pct = 100; color = "#5E9E7A"; label = "Vault-grade"; }
    gaugeFill.style.width = pct + "%";
    gaugeFill.style.background = color;
    gaugeTag.textContent = label;
  }

  lengthSlider.addEventListener('input', () => {
    state.length = parseInt(lengthSlider.value, 10);
    lengthValue.textContent = state.length;
    lengthTag.textContent = state.length + " chars";
    generate();
  });

  document.querySelectorAll('.toggle').forEach(toggle => {
    toggle.addEventListener('click', () => {
      const key = toggle.dataset.key;
      state[key] = !state[key];
      toggle.classList.toggle('on', state[key]);
      generate();
    });
  });

  generateBtn.addEventListener('click', generate);

  copyBtn.addEventListener('click', async () => {
    const text = output.textContent;
    if(!text || text.includes("Select at least")) return;
    try{
      await navigator.clipboard.writeText(text);
      copyBtn.textContent = "Copied";
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = "Copy";
        copyBtn.classList.remove('copied');
      }, 1400);
    }catch(e){
      copyBtn.textContent = "Press Ctrl+C";
      setTimeout(() => { copyBtn.textContent = "Copy"; }, 1400);
    }
  });

  generate();
})();
</script>

</body>
</html>
