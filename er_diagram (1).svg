<svg viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="1000" height="650" fill="#ffffff"/>
  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1f2933">ER Diagram — Random Password Generator</text>

  <!-- ==== Entity: USER ==== -->
  <g>
    <rect x="60" y="90" width="220" height="150" fill="#eef2ff" stroke="#4338ca" stroke-width="2" rx="4"/>
    <rect x="60" y="90" width="220" height="30" fill="#4338ca" rx="4"/>
    <rect x="60" y="110" width="220" height="10" fill="#4338ca"/>
    <text x="170" y="110" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">USER</text>
    <line x1="60" y1="120" x2="280" y2="120" stroke="#4338ca" stroke-width="1"/>
    <text x="75" y="140" font-size="12.5" fill="#1f2933"><tspan text-decoration="underline">UserID (PK)</tspan></text>
    <text x="75" y="160" font-size="12.5" fill="#1f2933">Username</text>
    <text x="75" y="180" font-size="12.5" fill="#1f2933">Email</text>
    <text x="75" y="200" font-size="12.5" fill="#1f2933">PasswordHash</text>
    <text x="75" y="220" font-size="12.5" fill="#1f2933">CreatedAt</text>
  </g>

  <!-- ==== Entity: SETTINGS ==== -->
  <g>
    <rect x="60" y="330" width="220" height="170" fill="#ecfeff" stroke="#0e7490" stroke-width="2" rx="4"/>
    <rect x="60" y="330" width="220" height="30" fill="#0e7490" rx="4"/>
    <rect x="60" y="350" width="220" height="10" fill="#0e7490"/>
    <text x="170" y="350" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">SETTINGS</text>
    <line x1="60" y1="360" x2="280" y2="360" stroke="#0e7490" stroke-width="1"/>
    <text x="75" y="380" font-size="12.5" fill="#1f2933"><tspan text-decoration="underline">SettingID (PK)</tspan></text>
    <text x="75" y="400" font-size="12.5" fill="#1f2933">UserID (FK)</text>
    <text x="75" y="420" font-size="12.5" fill="#1f2933">DefaultLength</text>
    <text x="75" y="440" font-size="12.5" fill="#1f2933">IncludeUppercase</text>
    <text x="75" y="460" font-size="12.5" fill="#1f2933">IncludeLowercase</text>
    <text x="75" y="480" font-size="12.5" fill="#1f2933">IncludeNumbers / Symbols</text>
  </g>

  <!-- ==== Entity: PASSWORD ==== -->
  <g>
    <rect x="390" y="200" width="240" height="170" fill="#fff7ed" stroke="#c2410c" stroke-width="2" rx="4"/>
    <rect x="390" y="200" width="240" height="30" fill="#c2410c" rx="4"/>
    <rect x="390" y="220" width="240" height="10" fill="#c2410c"/>
    <text x="510" y="220" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">PASSWORD</text>
    <line x1="390" y1="230" x2="630" y2="230" stroke="#c2410c" stroke-width="1"/>
    <text x="405" y="250" font-size="12.5" fill="#1f2933"><tspan text-decoration="underline">PasswordID (PK)</tspan></text>
    <text x="405" y="270" font-size="12.5" fill="#1f2933">UserID (FK)</text>
    <text x="405" y="290" font-size="12.5" fill="#1f2933">PasswordValue</text>
    <text x="405" y="310" font-size="12.5" fill="#1f2933">Length</text>
    <text x="405" y="330" font-size="12.5" fill="#1f2933">StrengthScore</text>
    <text x="405" y="350" font-size="12.5" fill="#1f2933">CreatedDate</text>
  </g>

  <!-- ==== Entity: HISTORY ==== -->
  <g>
    <rect x="730" y="230" width="220" height="130" fill="#f5f3ff" stroke="#6d28d9" stroke-width="2" rx="4"/>
    <rect x="730" y="230" width="220" height="30" fill="#6d28d9" rx="4"/>
    <rect x="730" y="250" width="220" height="10" fill="#6d28d9"/>
    <text x="840" y="250" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">HISTORY</text>
    <line x1="730" y1="260" x2="950" y2="260" stroke="#6d28d9" stroke-width="1"/>
    <text x="745" y="280" font-size="12.5" fill="#1f2933"><tspan text-decoration="underline">HistoryID (PK)</tspan></text>
    <text x="745" y="300" font-size="12.5" fill="#1f2933">PasswordID (FK)</text>
    <text x="745" y="320" font-size="12.5" fill="#1f2933">GeneratedDate</text>
    <text x="745" y="340" font-size="12.5" fill="#1f2933">DeviceInfo</text>
  </g>

  <!-- ==== Relationships ==== -->
  <!-- USER -> SETTINGS -->
  <line x1="170" y1="240" x2="170" y2="330" stroke="#334155" stroke-width="1.5"/>
  <text x="180" y="270" font-size="12" fill="#334155">1</text>
  <text x="180" y="325" font-size="12" fill="#334155">1</text>
  <text x="80" y="300" font-size="12.5" fill="#334155" font-style="italic">configures</text>

  <!-- USER -> PASSWORD -->
  <line x1="280" y1="180" x2="390" y2="255" stroke="#334155" stroke-width="1.5"/>
  <text x="292" y="195" font-size="12" fill="#334155">1</text>
  <text x="372" y="250" font-size="12" fill="#334155">M</text>
  <text x="270" y="230" font-size="12.5" fill="#334155" font-style="italic">generates</text>

  <!-- PASSWORD -> HISTORY -->
  <line x1="630" y1="290" x2="730" y2="290" stroke="#334155" stroke-width="1.5"/>
  <text x="640" y="282" font-size="12" fill="#334155">1</text>
  <text x="715" y="282" font-size="12" fill="#334155">M</text>
  <text x="645" y="310" font-size="12.5" fill="#334155" font-style="italic">logged in</text>

  <!-- Legend -->
  <g>
    <rect x="60" y="560" width="880" height="60" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <text x="75" y="580" font-size="12.5" fill="#334155" font-weight="bold">Legend:</text>
    <text x="75" y="600" font-size="12" fill="#334155">PK = Primary Key   |   FK = Foreign Key   |   1 / M = cardinality (one-to-one, one-to-many)</text>
  </g>
</svg>
